<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bet Arbitrage Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #f8fafc;
    }
    .card {
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    button {
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen">

  <div class="card bg-white p-6 rounded-2xl w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-4">Bet Arbitrage Calculator</h1>

    <!-- Line container -->
    <div id="linesContainer" class="flex flex-col gap-3">
      <!-- Line 1 (fixed) -->
      <div class="flex flex-wrap items-center gap-2 bg-gray-50 p-3 rounded-lg">
        <label class="w-16 font-medium">Odds:</label>
        <input type="number" id="odds1" step="0.01" placeholder="e.g. 2.50"
               class="flex-1 border p-2 rounded-lg" />
        <span class="font-medium">Stake: $20 (fixed)</span>
      </div>
    </div>

    <div class="flex justify-between mt-4">
      <button id="addBtn" class="bg-green-500 text-white px-3 py-2 rounded-lg font-medium">
        + Add Bet
      </button>
      <button id="calcBtn" class="bg-blue-500 text-white px-3 py-2 rounded-lg font-medium">
        Calculate
      </button>
    </div>

    <div id="results" class="mt-5 bg-gray-100 p-4 rounded-lg hidden">
      <h2 class="text-lg font-semibold mb-2">Results</h2>
      <div id="outputLines" class="space-y-2"></div>
      <div class="mt-3 border-t pt-2 text-sm">
        <p id="totalStake"></p>
        <p id="profit"></p>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('linesContainer');
    const addBtn = document.getElementById('addBtn');
    const calcBtn = document.getElementById('calcBtn');
    const results = document.getElementById('results');
    const outputLines = document.getElementById('outputLines');
    const totalStakeEl = document.getElementById('totalStake');
    const profitEl = document.getElementById('profit');
    let lineCount = 1;

    // Add new line
    addBtn.addEventListener('click', () => {
      if (lineCount >= 4) return;
      lineCount++;

      const line = document.createElement('div');
      line.className = 'flex flex-wrap items-center gap-2 bg-gray-50 p-3 rounded-lg';
      line.innerHTML = `
        <label class="w-16 font-medium">Odds:</label>
        <input type="number" step="0.01" placeholder="e.g. 3.10"
               class="flex-1 border p-2 rounded-lg odds-input" />
        <button class="bg-red-500 text-white px-2 py-1 rounded-lg removeBtn">−</button>
      `;
      container.appendChild(line);

      // Remove line
      line.querySelector('.removeBtn').addEventListener('click', () => {
        line.remove();
        lineCount--;
      });
    });

    // Calculate stakes
    calcBtn.addEventListener('click', () => {
      const oddsInputs = container.querySelectorAll('input[type="number"]');
      if (oddsInputs.length === 0) return;

      const odds = Array.from(oddsInputs).map(i => parseFloat(i.value)).filter(v => v > 1);
      if (odds.length === 0 || isNaN(odds[0])) return alert('Please enter valid odds.');

      const baseOdd = odds[0];
      const baseStake = 20;
      const payouts = [];
      const stakes = [baseStake];

      // Calculate proportional stakes for other lines
      for (let i = 1; i < odds.length; i++) {
        const stake = (baseOdd / odds[i]) * baseStake;
        stakes.push(stake);
      }

      // Compute total and profit
      const totalStake = stakes.reduce((a, b) => a + b, 0);
      const payout = baseStake * baseOdd;
      const profit = payout - totalStake;

      // Display results
      results.classList.remove('hidden');
      outputLines.innerHTML = '';

      odds.forEach((odd, i) => {
        const stake = stakes[i].toFixed(2);
        const potential = (stake * odd).toFixed(2);
        outputLines.innerHTML += `
          <div class="flex justify-between text-sm">
            <span>Line ${i + 1}: Odds ${odd}</span>
            <span>Stake: $${stake} → Payout: $${potential}</span>
          </div>`;
      });

      totalStakeEl.textContent = `Total Stake: $${totalStake.toFixed(2)}`;
      profitEl.textContent =
        `Guaranteed Profit: ${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}`;
      profitEl.className = profit >= 0 ? 'text-green-600' : 'text-red-600';
    });
  </script>
</body>
</html>
